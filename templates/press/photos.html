{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="content-wrapper">
    <h1 class="page-title">Фототека</h1>
    <div class="albums-grid">
        {% for album in albums %}
        <a href="{% url 'album_detail' album.slug %}" class="album-card">
            <div class="album-cover-wrapper">
                <img src="{{ album.cover.url }}" alt="{{ album.title }}" class="album-cover">
                <div class="album-count">{{ album.photos.count }} фото</div>
            </div>
            <p class="album-title">{{ album.title }}</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
