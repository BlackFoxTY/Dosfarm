{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="content-wrapper">
    <h1 class="page-title">Наши награды</h1>
    <div class="awards-list">
        {% for award in awards %}
        <div class="award-item">
            <img src="{{ award.image.url }}" alt="{{ award.title }}" class="award-image">
            <div class="award-body">
                <h3 class="award-title">{{ award.title }}</h3>
                <p class="award-description">{{ award.description }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
